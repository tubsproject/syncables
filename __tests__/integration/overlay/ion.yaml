openapi: 3.0.0
extends: https://raw.githubusercontent.com/tubsproject/syncables/refs/tags/v0.14.0/__tests__/integration/oad/ion.yaml
actions:
- target: $
  update:
    servers:
    - url: https://test.ion-ap.net
- target: paths['/api/v2/send-transactions']['get']['responses']['200']['content']['application/json']
  update:
    syncables:
    - name: integrationTest
- target: components
  update:
    paginationSchemes:
      default:
        paginate: results
        offset:
          parameter: offset
