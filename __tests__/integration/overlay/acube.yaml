openapi: 3.0.0
extends: https://raw.githubusercontent.com/tubsproject/syncables/refs/tags/v0.14.0/__tests__/integration/oad/acube.yaml
info:
  description: Add syncables to the A-Cube Peppol API.
actions:
- target: paths['/invoices/outgoing/ubl']['post']
  update:
    requestBody:
      content:
        application/xml:
          schema:
            type: string
        application/json:
          schema:
            type: string
- target: paths['/invoices']['get']['responses']['200']['content']['application/json']
  update:
    syncables:
    - name: integrationTest
- target: components
  update:
    paginationSchemes:
      default:
        paginate: $
        pageNumber:
          parameter: page
