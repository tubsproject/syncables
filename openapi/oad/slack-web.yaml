openapi: 3.0.0
externalDocs:
  description: Learn more about the Slack Web API
  url: https://api.slack.com/web
info:
  contact:
    name: Slack developer relations
    url: https://api.slack.com/support
  description: One way to interact with the Slack platform is its HTTP RPC-based
    Web API, a collection of methods requiring OAuth 2.0-based user, bot, or
    workspace tokens blessed with related OAuth scopes.
  title: Slack Web API
  version: 1.7.0
paths:
  /conversations.list:
    get:
      description: Lists all channels in a Slack team.
      externalDocs:
        description: API method documentation
        url: https://api.slack.com/methods/conversations.list
      operationId: conversations_list
      parameters:
        - description: Paginate through collections of data by setting the `cursor`
            parameter to a `next_cursor` attribute returned by a previous
            request's `response_metadata`. Default value fetches the first
            "page" of the collection. See [pagination](/docs/pagination) for
            more detail.
          in: query
          name: cursor
          schema:
            type: string
        - description: Set to `true` to exclude archived channels from the list
          in: query
          name: exclude_archived
          schema:
            type: boolean
        - description: The maximum number of items to return. Fewer than the requested
            number of items may be returned, even if the end of the list hasn't
            been reached. Must be an integer no larger than 1000.
          in: query
          name: limit
          schema:
            type: integer
        - description: Encoded team id to list channels in, required if token belongs to
            org-wide app
          in: query
          name: team_id
          schema:
            type: string
        - description: "Authentication token. Requires scope: `conversations:read`"
          in: query
          name: token
          schema:
            type: string
        - description: Mix and match channel types by providing a comma-separated list of
            any combination of `public_channel`, `private_channel`, `mpim`, `im`
          in: query
          name: types
          schema:
            type: string
      responses:
        "200":
          description: Typical success response with only public channels
          content:
            application/json:
              schema:
                additionalProperties: false
                description: Schema for successful response from conversations.list method
                properties:
                  channels:
                    items:
                      $ref: "#/components/schemas/objs_conversation"
                    type: array
                    uniqueItems: true
                  ok:
                    $ref: "#/components/schemas/defs_ok_true"
                  response_metadata:
                    additionalProperties: false
                    properties:
                      next_cursor:
                        type: string
                    required:
                      - next_cursor
                    type: object
                required:
                  - channels
                  - ok
                title: conversations.list success schema
                type: object
              examples:
                response:
                  value:
                    channels:
                      - created: 1449252889
                        creator: U012A3CDE
                        id: C012AB3CD
                        is_archived: false
                        is_channel: true
                        is_ext_shared: false
                        is_general: true
                        is_group: false
                        is_im: false
                        is_member: true
                        is_mpim: false
                        is_org_shared: false
                        is_pending_ext_shared: false
                        is_private: false
                        is_shared: false
                        name: general
                        name_normalized: general
                        num_members: 4
                        pending_shared: []
                        previous_names: []
                        purpose:
                          creator: ""
                          last_set: 0
                          value: This channel is for team-wide communication and announcements. All team
                            members are in this channel.
                        topic:
                          creator: ""
                          last_set: 0
                          value: Company-wide announcements and work-based matters
                        unlinked: 0
                      - created: 1449252889
                        creator: U061F7AUR
                        id: C061EG9T2
                        is_archived: false
                        is_channel: true
                        is_ext_shared: false
                        is_general: false
                        is_group: false
                        is_im: false
                        is_member: true
                        is_mpim: false
                        is_org_shared: false
                        is_pending_ext_shared: false
                        is_private: false
                        is_shared: false
                        name: random
                        name_normalized: random
                        num_members: 4
                        pending_shared: []
                        previous_names: []
                        purpose:
                          creator: ""
                          last_set: 0
                          value: A place for non-work-related flimflam, faffing, hodge-podge or
                            jibber-jabber you'd prefer to keep out of more
                            focused work-related channels.
                        topic:
                          creator: ""
                          last_set: 0
                          value: Non-work banter and water cooler conversation
                        unlinked: 0
                    ok: true
                    response_metadata:
                      next_cursor: dGVhbTpDMDYxRkE1UEI=
        default:
          description: Typical error response
          content:
            application/json:
              schema:
                additionalProperties: false
                description: Schema for error response from conversations.list method
                properties:
                  callstack:
                    description: "Note: PHP callstack is only visible in dev/qa"
                    type: string
                  error:
                    enum:
                      - account_inactive
                      - invalid_arg_name
                      - invalid_array_arg
                      - invalid_auth
                      - invalid_charset
                      - invalid_form_data
                      - invalid_json
                      - invalid_post_type
                      - json_not_object
                      - missing_post_type
                      - missing_scope
                      - not_authed
                      - request_timeout
                      - upgrade_required
                    type: string
                  needed:
                    type: string
                  ok:
                    $ref: "#/components/schemas/defs_ok_false"
                  provided:
                    type: string
                required:
                  - error
                  - ok
                title: conversations.list error schema
                type: object
              examples:
                response:
                  value:
                    error: invalid_auth
                    ok: false
      security:
        - slackAuth:
            - channels:read
            - groups:read
            - im:read
            - mpim:read
      tags:
        - conversations
